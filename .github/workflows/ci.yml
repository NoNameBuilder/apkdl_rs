name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - run: cp target/release/apkdl apkdl-linux && chmod +x apkdl-linux
      - uses: actions/upload-artifact@v4
        with:
          name: apkdl-linux
          path: apkdl-linux

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apkdl-linux
      - run: chmod +x apkdl-linux
      - uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest build
          artifacts: apkdl-linux
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
